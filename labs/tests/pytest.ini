[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum required version
minversion = 7.0

# Default command-line options:
# -v: verbose output showing test names
# --tb=short: shorter tracebacks for readability
# --strict-markers: fail on unknown markers
# -q: quiet mode (override with -v on CLI for verbose)
addopts =
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require Docker)
    slow: Tests that take longer than 5 seconds

# Logging configuration for test output
log_cli = false
log_cli_level = WARNING
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout for individual tests (requires pytest-timeout plugin if available)
# timeout = 30
